<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kuralle Audit Log</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; color: #111; }
      form { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
      input, button { font: inherit; padding: 0.45rem 0.6rem; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; vertical-align: top; }
      th { background: #f4f4f4; }
      pre { margin: 0; white-space: pre-wrap; word-break: break-word; }
      .error { color: #b00020; }
    </style>
  </head>
  <body>
    <h1>Kuralle Audit Log</h1>
    <form id="audit-form">
      <input id="session-id" name="sessionId" placeholder="Session ID" required>
      <input id="types" name="types" placeholder="types,comma,separated">
      <input id="from" name="from" placeholder="from ISO date">
      <input id="to" name="to" placeholder="to ISO date">
      <button type="submit">Load Audit Log</button>
    </form>
    <p id="status"></p>
    <table>
      <thead>
        <tr>
          <th>At</th>
          <th>Type</th>
          <th>Agent</th>
          <th>Payload</th>
        </tr>
      </thead>
      <tbody id="entries"></tbody>
    </table>
    <script>
      const form = document.getElementById('audit-form');
      const statusEl = document.getElementById('status');
      const entriesEl = document.getElementById('entries');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        statusEl.textContent = 'Loading...';
        statusEl.className = '';
        entriesEl.textContent = '';

        const sessionId = document.getElementById('session-id').value.trim();
        const params = new URLSearchParams();
        for (const id of ['types', 'from', 'to']) {
          const value = document.getElementById(id).value.trim();
          if (value) params.set(id, value);
        }

        try {
          const suffix = params.toString() ? `?${params}` : '';
          const response = await fetch(`/api/sessions/${encodeURIComponent(sessionId)}/audit${suffix}`);
          const body = await response.json();
          if (!response.ok) throw new Error(body.error || `HTTP ${response.status}`);
          statusEl.textContent = `${body.total} audit entries`;
          for (const entry of body.entries) {
            const row = document.createElement('tr');
            row.append(cell(entry.at));
            row.append(cell(entry.type));
            row.append(cell(entry.agentId || ''));
            const payload = document.createElement('td');
            const pre = document.createElement('pre');
            pre.textContent = JSON.stringify(entry, null, 2);
            payload.append(pre);
            row.append(payload);
            entriesEl.append(row);
          }
        } catch (error) {
          statusEl.textContent = error.message;
          statusEl.className = 'error';
        }
      });

      function cell(value) {
        const td = document.createElement('td');
        td.textContent = value;
        return td;
      }
    </script>
  </body>
</html>
