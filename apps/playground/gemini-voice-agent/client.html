<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Street Burger — Voice Ordering</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #09090b; color: #e4e4e7;
      display: flex; justify-content: center; align-items: flex-start;
      min-height: 100vh; padding: 40px 16px;
    }
    .app { width: 480px; }

    h1 { font-size: 20px; font-weight: 600; color: #fafafa; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #71717a; margin-bottom: 28px; }

    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px; border-radius: 8px;
      background: #18181b; border: 1px solid #27272a;
      margin-bottom: 16px; font-size: 13px;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #52525b; flex-shrink: 0; }
    .status-dot.connected { background: #22c55e; box-shadow: 0 0 6px #22c55e40; }
    .status-dot.error { background: #ef4444; }
    .status-text { color: #a1a1aa; }

    .stats { display: flex; gap: 1px; background: #27272a; border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
    .stat { flex: 1; background: #18181b; padding: 12px; text-align: center; }
    .stat-value { font-size: 22px; font-weight: 600; color: #fafafa; font-variant-numeric: tabular-nums; }
    .stat-label { font-size: 10px; color: #71717a; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }

    .waveform {
      height: 48px; background: #18181b; border: 1px solid #27272a;
      border-radius: 10px; margin-bottom: 16px; overflow: hidden; position: relative;
    }
    canvas { width: 100%; height: 100%; display: block; }

    .controls { display: flex; gap: 10px; margin-bottom: 20px; }
    button {
      flex: 1; padding: 12px 0;
      border: 1px solid #27272a; border-radius: 10px;
      background: #18181b; color: #e4e4e7;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: all 0.15s;
    }
    button:hover { background: #27272a; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    button.connect-btn { background: #c2410c; border-color: #c2410c; color: #fff; }
    button.connect-btn:hover { background: #ea580c; }
    button.connect-btn.active { background: #dc2626; border-color: #dc2626; }
    button.mic-btn.active { background: #dc2626; border-color: #dc2626; color: #fff; }

    .transcript-header {
      font-size: 11px; font-weight: 500; color: #71717a; text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 8px;
    }
    .transcript {
      background: #18181b; border: 1px solid #27272a; border-radius: 10px;
      padding: 14px; max-height: 520px; overflow-y: auto;
      font-size: 13px; line-height: 1.7;
    }
    .transcript:empty::after { content: 'Waiting for conversation...'; color: #3f3f46; }
    .msg { margin-bottom: 8px; }
    .msg.user { color: #60a5fa; }
    .msg.user::before { content: 'You: '; font-weight: 600; }
    .msg.agent { color: #a78bfa; }
    .msg.agent { color: #fb923c; }
    .msg.agent::before { content: 'Street Burger: '; font-weight: 600; }
    .msg.system { color: #52525b; font-style: italic; font-size: 12px; }
    .msg.tool-call { color: #facc15; font-size: 12px; font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace; }
    .msg.tool-call::before { content: ''; }
    .tool-call-details { margin-top: 2px; padding: 4px 8px; background: #1c1c22; border-radius: 4px; font-size: 11px; color: #a1a1aa; white-space: pre-wrap; word-break: break-all; }
    .tool-call-details .label { color: #facc15; font-weight: 600; }
    .tool-call-details .result { color: #34d399; }
    .tool-call-details .error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="app">
    <h1>Street Burger</h1>
    <p class="subtitle">Sri Lanka's Original Gourmet — Voice Ordering</p>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Disconnected</span>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="chunks">0</div>
        <div class="stat-label">Audio out</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="turns">0</div>
        <div class="stat-label">Turns</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="tools">0</div>
        <div class="stat-label">Tools</div>
      </div>
    </div>

    <div class="waveform"><canvas id="waveform"></canvas></div>

    <div class="controls">
      <button id="connectBtn" class="connect-btn" onclick="toggleConnection()">Connect</button>
      <button id="micBtn" class="mic-btn" disabled onclick="toggleMic()">Unmute Mic</button>
    </div>

    <div class="transcript-header">Transcript</div>
    <div class="transcript" id="transcript"></div>
  </div>

  <script>
    const SAMPLE_RATE = 24000;

    let ws = null;
    let audioCtx = null;
    let micStream = null;
    let micProcessor = null;
    let isMuted = true;
    let playbackQueue = [];
    let isPlaying = false;
    let chunksReceived = 0;
    let turnsCount = 0;
    let toolsCount = 0;

    const canvas = document.getElementById('waveform');
    const canvasCtx = canvas.getContext('2d');
    let analyser = null;

    function setStatus(text, state) {
      document.getElementById('statusText').textContent = text;
      const dot = document.getElementById('statusDot');
      dot.className = 'status-dot' + (state ? ' ' + state : '');
    }

    function addMessage(text, cls) {
      const el = document.createElement('div');
      el.className = 'msg ' + cls;
      el.textContent = text;
      const t = document.getElementById('transcript');
      t.appendChild(el);
      t.scrollTop = t.scrollHeight;
    }

    // ─── Connection ──────────────────────────────────────────────────

    async function toggleConnection() {
      if (ws && ws.readyState <= 1) {
        ws.close();
        return;
      }

      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const url = `${proto}//${location.host}`;

      setStatus('Connecting...', '');
      addMessage('Connecting...', 'system');

      try {
        audioCtx = new AudioContext({ sampleRate: SAMPLE_RATE });
        if (audioCtx.state === 'suspended') audioCtx.resume();
        ws = new WebSocket(url);
        ws.binaryType = 'arraybuffer';

        ws.onopen = () => {
          setStatus('Connected', 'connected');
          document.getElementById('connectBtn').textContent = 'Disconnect';
          document.getElementById('connectBtn').classList.add('active');
          document.getElementById('micBtn').disabled = false;
          addMessage('Connected', 'system');
        };

        ws.onmessage = (e) => {
          if (e.data instanceof ArrayBuffer) {
            handleAudio(e.data);
          } else {
            handleJson(JSON.parse(e.data));
          }
        };

        ws.onclose = (e) => {
          setStatus('Disconnected (' + e.code + ')', '');
          document.getElementById('connectBtn').textContent = 'Connect';
          document.getElementById('connectBtn').classList.remove('active');
          document.getElementById('micBtn').disabled = true;
          stopMic();
          addMessage('Disconnected', 'system');
        };

        ws.onerror = () => {
          setStatus('Connection error', 'error');
          addMessage('WebSocket error', 'system');
        };
      } catch (err) {
        addMessage('Error: ' + err.message, 'system');
      }
    }

    // ─── Messages ────────────────────────────────────────────────────

    const pendingToolCalls = new Map();

    // Streaming agent transcript: buffer partial chunks into one element,
    // finalize on turn-complete so each agent response is a single message.
    let agentStreamEl = null;
    let agentStreamText = '';

    function handleJson(msg) {
      if (msg.type === 'session_started') {
        addMessage('Session: ' + msg.sessionId, 'system');
      } else if (msg.type === 'user_transcription') {
        if (msg.text) {
          turnsCount++;
          document.getElementById('turns').textContent = turnsCount;
          addMessage(msg.text, 'user');
        }
      } else if (msg.type === 'agent_transcript') {
        if (!msg.text) return;
        if (!agentStreamEl) {
          agentStreamEl = document.createElement('div');
          agentStreamEl.className = 'msg agent';
          agentStreamText = '';
          const t = document.getElementById('transcript');
          t.appendChild(agentStreamEl);
        }
        agentStreamText += msg.text;
        agentStreamEl.textContent = agentStreamText;
        const t = document.getElementById('transcript');
        t.scrollTop = t.scrollHeight;
      } else if (msg.type === 'turn_complete') {
        agentStreamEl = null;
        agentStreamText = '';
      } else if (msg.type === 'tool_call') {
        toolsCount++;
        document.getElementById('tools').textContent = toolsCount;
        const el = document.createElement('div');
        el.className = 'msg tool-call';
        const args = msg.args ? tryFormatJson(msg.args) : '';
        el.innerHTML = `<span class="label">Tool:</span> ${msg.name}${args ? '<div class="tool-call-details">' + args + '</div>' : ''}`;
        pendingToolCalls.set(msg.name, el);
        const t = document.getElementById('transcript');
        t.appendChild(el);
        t.scrollTop = t.scrollHeight;
      } else if (msg.type === 'tool_result') {
        const output = msg.output ? tryFormatJson(msg.output) : '';
        const cls = msg.isError ? 'error' : 'result';
        const label = msg.isError ? 'Error' : 'Result';
        const el = pendingToolCalls.get(msg.name);
        if (el) {
          el.innerHTML += `<div class="tool-call-details"><span class="${cls}">${label}:</span> ${output}</div>`;
          pendingToolCalls.delete(msg.name);
        } else {
          const newEl = document.createElement('div');
          newEl.className = 'msg tool-call';
          newEl.innerHTML = `<span class="label">Tool:</span> ${msg.name} <span class="${cls}">→ ${output}</span>`;
          const t = document.getElementById('transcript');
          t.appendChild(newEl);
          t.scrollTop = t.scrollHeight;
        }
      } else if (msg.type === 'agent_state') {
        // Show thinking/speaking states
        if (msg.state === 'thinking') addMessage('Thinking...', 'system');
      } else if (msg.type === 'handoff') {
        addMessage('Handoff → ' + msg.to, 'system');
      }
    }

    function tryFormatJson(str) {
      try {
        return JSON.stringify(JSON.parse(str), null, 2);
      } catch {
        return str;
      }
    }

    // ─── Audio Output (with jitter buffer) ───────────────────────────

    const BUFFER_TARGET_MS = 200;
    let bufferReady = false;
    let scheduledEnd = 0;

    function handleAudio(buf) {
      chunksReceived++;
      document.getElementById('chunks').textContent = chunksReceived;

      const int16 = new Int16Array(buf);
      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) {
        float32[i] = int16[i] / 32768;
      }

      playbackQueue.push(float32);
      if (!isPlaying) {
        const bufferedMs = playbackQueue.length * (float32.length / SAMPLE_RATE) * 1000;
        if (!bufferReady && bufferedMs < BUFFER_TARGET_MS) return;
        bufferReady = true;
        scheduledEnd = audioCtx.currentTime;
        drainPlayback();
      }
    }

    function drainPlayback() {
      if (!playbackQueue.length) { isPlaying = false; bufferReady = false; return; }
      isPlaying = true;
      const samples = playbackQueue.shift();
      const buffer = audioCtx.createBuffer(1, samples.length, SAMPLE_RATE);
      buffer.getChannelData(0).set(samples);
      const src = audioCtx.createBufferSource();
      src.buffer = buffer;
      src.connect(audioCtx.destination);
      const startTime = Math.max(audioCtx.currentTime, scheduledEnd);
      src.start(startTime);
      scheduledEnd = startTime + buffer.duration;
      src.onended = drainPlayback;
    }

    // ─── Microphone ──────────────────────────────────────────────────

    async function toggleMic() {
      if (isMuted) {
        await startMic();
        isMuted = false;
        document.getElementById('micBtn').textContent = 'Mute Mic';
        document.getElementById('micBtn').classList.add('active');
      } else {
        stopMic();
        isMuted = true;
        document.getElementById('micBtn').textContent = 'Unmute Mic';
        document.getElementById('micBtn').classList.remove('active');
      }
    }

    async function startMic() {
      try {
        micStream = await navigator.mediaDevices.getUserMedia({
          audio: { sampleRate: SAMPLE_RATE, channelCount: 1, echoCancellation: true, noiseSuppression: true }
        });

        const source = audioCtx.createMediaStreamSource(micStream);

        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        drawWaveform();

        micProcessor = audioCtx.createScriptProcessor(4096, 1, 1);
        micProcessor.onaudioprocess = (e) => {
          if (!ws || ws.readyState !== 1 || isMuted) return;
          const float32 = e.inputBuffer.getChannelData(0);
          const int16 = new Int16Array(float32.length);
          for (let i = 0; i < float32.length; i++) {
            int16[i] = Math.max(-32768, Math.min(32767, Math.round(float32[i] * 32767)));
          }
          ws.send(int16.buffer);
        };

        source.connect(micProcessor);
        micProcessor.connect(audioCtx.destination);
        addMessage('Mic active', 'system');
      } catch (err) {
        addMessage('Mic error: ' + err.message, 'system');
      }
    }

    function stopMic() {
      if (micProcessor) { micProcessor.disconnect(); micProcessor = null; }
      if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
      analyser = null;
    }

    // ─── Waveform ────────────────────────────────────────────────────

    function drawWaveform() {
      if (!analyser) {
        canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
        return;
      }
      requestAnimationFrame(drawWaveform);

      const w = canvas.width = canvas.offsetWidth * 2;
      const h = canvas.height = canvas.offsetHeight * 2;
      const bufLen = analyser.frequencyBinCount;
      const data = new Uint8Array(bufLen);
      analyser.getByteTimeDomainData(data);

      canvasCtx.clearRect(0, 0, w, h);
      canvasCtx.lineWidth = 2;
      canvasCtx.strokeStyle = '#fb923c60';
      canvasCtx.beginPath();

      const sliceWidth = w / bufLen;
      let x = 0;
      for (let i = 0; i < bufLen; i++) {
        const v = data[i] / 128.0;
        const y = v * h / 2;
        if (i === 0) canvasCtx.moveTo(x, y);
        else canvasCtx.lineTo(x, y);
        x += sliceWidth;
      }
      canvasCtx.lineTo(w, h / 2);
      canvasCtx.stroke();
    }
  </script>
</body>
</html>
