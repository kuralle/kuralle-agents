app = 'streetburger-openai-stt'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.openai-stt'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512'
  cpu_kind = 'shared'
  cpus = 1
