<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1ad0a0"/>
      <stop offset="1" stop-color="#017a5e"/>
    </linearGradient>
    <linearGradient id="pillDark" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00b894"/>
      <stop offset="1" stop-color="#008f6f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- soft sheen -->
  <ellipse cx="312" cy="190" rx="560" ry="300" fill="#ffffff" opacity="0.07"/>
  <ellipse cx="780" cy="900" rx="460" ry="300" fill="#003b2c" opacity="0.10"/>

  <!-- Hero capsule pill, centered, tilted -28° -->
  <g transform="rotate(-28 512 512)">
    <!-- drop shadow (offset, semi-transparent) -->
    <rect x="232" y="412" width="560" height="236" rx="118" fill="#003b2c" opacity="0.22"/>
    <!-- pill body (dark half) -->
    <rect x="232" y="392" width="560" height="236" rx="118" fill="url(#pillDark)"/>
    <!-- light half -->
    <clipPath id="rightHalf"><rect x="512" y="392" width="280" height="236"/></clipPath>
    <rect x="232" y="392" width="560" height="236" rx="118" fill="#eafff8" clip-path="url(#rightHalf)"/>
    <!-- outline -->
    <rect x="232" y="392" width="560" height="236" rx="118" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.55"/>
    <!-- center split -->
    <line x1="512" y1="396" x2="512" y2="624" stroke="#007a5e" stroke-width="14" opacity="0.40"/>
    <!-- granules on the light half -->
    <circle cx="596" cy="470" r="17" fill="#00b894"/>
    <circle cx="664" cy="512" r="17" fill="#00b894"/>
    <circle cx="592" cy="556" r="17" fill="#00b894"/>
    <!-- gloss on the dark half -->
    <rect x="288" y="430" width="180" height="34" rx="17" fill="#ffffff" opacity="0.40"/>
  </g>
</svg>
