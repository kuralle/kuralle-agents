# fly.toml — Kuralle SIP Voice Agent
# SIP signaling on UDP 5060, RTP media on UDP 10000+, HTTP health on 3000

app = 'kuralle-sip-voice-agent'
primary_region = 'sin'

[build]

# HTTP health check (Fly uses this to know the VM is alive)
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

# SIP signaling — UDP 5060
[[services]]
  protocol = 'udp'
  internal_port = 5060
  [[services.ports]]
    port = 5060

# RTP media ports (each call uses one port)
[[services]]
  protocol = 'udp'
  internal_port = 10000
  [[services.ports]]
    port = 10000

[[services]]
  protocol = 'udp'
  internal_port = 10001
  [[services.ports]]
    port = 10001

[[services]]
  protocol = 'udp'
  internal_port = 10002
  [[services.ports]]
    port = 10002

[[services]]
  protocol = 'udp'
  internal_port = 10003
  [[services.ports]]
    port = 10003

[[services]]
  protocol = 'udp'
  internal_port = 10004
  [[services.ports]]
    port = 10004

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
